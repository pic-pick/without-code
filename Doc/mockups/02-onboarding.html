<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드없이 — 온보딩</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#1C1C1A; --red:#E8483A;
  --white:#F7F7F5; --char:#444441; --stone:#888780;
  --cloud:#D3D1C7; --light:#F2F0EB;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--white); color:var(--ink);
  min-height:100vh; display:flex; flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fu{animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both;}
.d1{animation-delay:.05s;}.d2{animation-delay:.1s;}.d3{animation-delay:.15s;}

/* ── HEADER ── */
.top-bar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid var(--cloud);
}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-name{font-size:14px;font-weight:800;letter-spacing:-.3px;}
.logo-name b{color:var(--red);}
.skip-btn{font-size:13px;font-weight:600;color:var(--stone);background:none;border:none;cursor:pointer;padding:6px 0;}

/* ── PROGRESS ── */
.progress-wrap{padding:20px 20px 0;}
.progress-track{
  display:flex; align-items:center; gap:6px;
  margin-bottom:6px;
}
.prog-bar{
  flex:1; height:3px; border-radius:2px;
  background:var(--cloud);
  transition:background .3s;
}
.prog-bar.done{background:var(--ink);}
.prog-bar.active{background:var(--red);}
.prog-label{font-size:12px;color:var(--stone);}
.prog-label b{color:var(--ink);}

/* ── CONTENT ── */
.content{
  flex:1; padding:28px 20px 120px;
  overflow-y:auto;
}
.step-title{font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.3;margin-bottom:6px;}
.step-sub{font-size:14px;color:var(--stone);line-height:1.55;margin-bottom:28px;}

/* FIELD */
.field{margin-bottom:18px;}
label{display:block;font-size:13px;font-weight:600;color:var(--char);margin-bottom:7px;}
input[type=text]{
  width:100%; padding:13px 14px;
  border:1.5px solid var(--cloud); border-radius:10px;
  font-family:inherit; font-size:16px; color:var(--ink);
  background:#fff; outline:none;
  -webkit-appearance:none;
  transition:border-color .12s;
}
input[type=text]:focus{border-color:var(--ink);}
input[type=text].ok{border-color:#22c55e;}
.field-hint{
  display:flex; align-items:center; gap:5px;
  font-size:12px; margin-top:7px;
}
.field-hint.ok{color:#16a34a;}
.field-hint.muted{color:var(--stone);}
.url-preview{
  display:inline-flex; align-items:center; gap:3px;
  background:var(--light); border-radius:6px;
  padding:5px 10px; font-size:12px; color:var(--stone);
  margin-top:8px;
}
.url-preview strong{color:var(--ink);font-weight:700;}

/* CHIPS */
.chip-section{margin-bottom:22px;}
.chip-section-label{font-size:13px;font-weight:700;color:var(--char);margin-bottom:10px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  padding:9px 14px; border-radius:8px;
  border:1.5px solid var(--cloud); background:#fff;
  font-family:inherit; font-size:14px; font-weight:500; color:var(--char);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .1s, background .1s, color .1s;
}
.chip:active{background:var(--light);}
.chip.on{border-color:var(--ink); background:var(--ink); color:var(--white); font-weight:600;}

/* ── BOTTOM CTA ── */
.bottom-cta{
  position:fixed; bottom:0; left:0; right:0;
  padding:12px 20px;
  background:var(--white); border-top:1px solid var(--cloud);
  /* iOS safe area */
  padding-bottom:calc(12px + env(safe-area-inset-bottom));
}
.btn-row{display:flex;gap:8px;}
.btn{
  flex:1; padding:15px; border-radius:10px;
  font-family:inherit; font-size:16px; font-weight:700;
  cursor:pointer; border:none;
  -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.btn-primary{background:var(--ink);color:var(--white);}
.btn-primary:active{background:var(--char);}
.btn-secondary{
  background:var(--light); color:var(--char);
  border:1.5px solid var(--cloud); flex:0 0 auto;
  padding:15px 18px;
}
.btn-secondary:active{background:var(--cloud);}

/* ── DESKTOP ── */
@media(min-width:768px){
  .content{max-width:480px;margin:0 auto;padding-left:0;padding-right:0;}
  .progress-wrap{max-width:480px;margin:0 auto;padding-left:0;padding-right:0;}
  .top-bar{padding:16px 32px;}
  body{align-items:stretch;}
  .bottom-cta{padding:16px;max-width:480px;left:50%;transform:translateX(-50%);border-left:1px solid var(--cloud);border-right:1px solid var(--cloud);}
}
</style>
</head>
