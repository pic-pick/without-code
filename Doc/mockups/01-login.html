<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드없이 — 로그인</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#1C1C1A; --red:#E8483A;
  --white:#F7F7F5; --char:#444441; --stone:#888780;
  --cloud:#D3D1C7; --light:#F2F0EB;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--white); color:var(--ink);
  min-height:100vh; display:flex; flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ── NAV ── */
nav{
  display:flex; align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--cloud);
  background:var(--white);
}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{
  width:30px; height:30px; border-radius:7px;
  background:var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.logo-name b{color:var(--red);}

/* ── MAIN ── */
main{
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:32px 20px 48px;
}
.box{width:100%;max-width:400px;}

.header{margin-bottom:28px;}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px;line-height:1.3;}
.header p{font-size:14px;color:var(--stone);line-height:1.6;}

/* ── OAUTH BUTTONS ── */
.btn-oauth{
  display:flex; align-items:center; gap:12px;
  width:100%; padding:14px 18px;
  border-radius:10px; border:1.5px solid var(--cloud);
  background:#fff; cursor:pointer;
  font-family:inherit; font-size:15px; font-weight:600; color:var(--ink);
  margin-bottom:10px;
  /* 모바일: 터치 피드백 */
  -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.btn-oauth:last-of-type{margin-bottom:0;}
.btn-oauth:active{background:var(--light);}
.btn-oauth.kakao{background:#FEE500;border-color:#FEE500;color:#1A1A1A;}
.btn-oauth.kakao:active{background:#f0d900;}
.btn-oauth-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.divider{
  display:flex; align-items:center; gap:12px;
  margin:22px 0; font-size:13px; color:var(--stone);
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--cloud);}

.legal{
  margin-top:20px; font-size:12px; color:var(--stone);
  line-height:1.7; text-align:center;
}
.legal a{color:var(--char);text-decoration:underline;text-underline-offset:2px;}

footer{padding:20px;border-top:1px solid var(--light);font-size:12px;color:var(--stone);text-align:center;}

/* ── DESKTOP ── */
@media(min-width:768px){
  nav{padding:16px 32px;}
  .header h1{font-size:26px;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-mark">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M5 1L1 6l4 5" stroke="#E8483A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 1l4 5-4 5" stroke="#E8483A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-name">코드<b>없이</b></span>
  </div>
</nav>

<main>
  <div class="box">
    <div class="header">
      <h1>코드없이에<br>오신 걸 환영해요</h1>
      <p>AI로 만든 것을 공유하고,<br>프롬프트를 나누고, 함께 성장하세요</p>
    </div>

    <button class="btn-oauth kakao">
      <span class="btn-oauth-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2.5C5.86 2.5 2.5 5.19 2.5 8.5c0 2.08 1.24 3.9 3.12 5.02L4.75 18l3.56-2.35c.55.08 1.12.12 1.69.12 4.14 0 7.5-2.69 7.5-6S14.14 2.5 10 2.5z" fill="#1A1A1A"/>
        </svg>
      </span>
      카카오로 계속하기
    </button>

    <div class="divider">또는</div>

    <button class="btn-oauth">
      <span class="btn-oauth-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M18.4 10.2c0-.66-.06-1.3-.17-1.9H10v3.6h4.7c-.2 1.04-.8 1.92-1.7 2.52v2.08h2.74C17.5 14.9 18.4 12.7 18.4 10.2z" fill="#4285F4"/>
          <path d="M10 18c2.3 0 4.22-.76 5.63-2.06l-2.74-2.12c-.76.5-1.73.8-2.9.8-2.22 0-4.1-1.5-4.77-3.52H2.4v2.2C3.8 16.18 6.7 18 10 18z" fill="#34A853"/>
          <path d="M5.23 11.1C5.06 10.6 4.97 10.06 4.97 9.5s.09-1.1.26-1.6V5.7H2.4A8 8 0 0 0 2 9.5c0 1.3.3 2.52.4 3.8l2.83-2.2z" fill="#FBBC05"/>
          <path d="M10 4.5c1.25 0 2.37.43 3.25 1.28l2.44-2.44C14.22 2 12.28 1.5 10 1.5 6.7 1.5 3.8 3.32 2.4 6L5.23 8.2C5.9 6.18 7.78 4.5 10 4.5z" fill="#EA4335"/>
        </svg>
      </span>
      Google로 계속하기
    </button>

    <button class="btn-oauth">
      <span class="btn-oauth-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 1C5.03 1 1 5.03 1 10c0 3.98 2.58 7.36 6.16 8.56.45.08.61-.2.61-.43v-1.5c-2.5.54-3.03-1.2-3.03-1.2-.41-1.04-.99-1.32-.99-1.32-.81-.55.06-.54.06-.54.9.06 1.37.92 1.37.92.8 1.36 2.09.97 2.6.74.08-.58.31-.97.57-1.2-1.99-.22-4.08-1-4.08-4.43 0-0.98.35-1.78.92-2.41-.09-.23-.4-1.14.09-2.37 0 0 .75-.24 2.45.91a8.55 8.55 0 0 1 4.46 0c1.7-1.15 2.45-.91 2.45-.91.49 1.23.18 2.14.09 2.37.57.63.92 1.43.92 2.41 0 3.44-2.1 4.2-4.1 4.42.32.28.61.83.61 1.67v2.48c0 .24.16.52.62.43A9 9 0 0 0 19 10c0-4.97-4.03-9-9-9z" fill="#1C1C1A"/>
        </svg>
      </span>
      GitHub으로 계속하기
    </button>

    <p class="legal">
      계속 진행하면 <a href="#">이용약관</a>과 <a href="#">개인정보처리방침</a>에 동의하는 것으로 간주됩니다
    </p>
  </div>
</main>

<footer>© 2026 코드없이</footer>
</body>
</html>
