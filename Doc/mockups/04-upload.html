<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코드없이 — 프로젝트 올리기</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --ink:#1C1C1A; --red:#E8483A;
  --white:#F7F7F5; --char:#444441; --stone:#888780;
  --cloud:#D3D1C7; --light:#F2F0EB;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--white); color:var(--ink);
  -webkit-font-smoothing:antialiased;
  /* 하단 바 높이만큼 패딩 */
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
}

/* ── TOP NAV ── */
nav{
  position:sticky; top:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:52px;
  background:var(--white);
  border-bottom:1px solid var(--cloud);
}
.nav-back{
  display:flex; align-items:center; gap:4px;
  font-size:14px; font-weight:600; color:var(--char);
  cursor:pointer; padding:8px 0;
  -webkit-tap-highlight-color:transparent;
}
.nav-back:active{opacity:.6;}
.nav-title{font-size:15px;font-weight:700;color:var(--ink);}
.nav-pub{
  padding:7px 14px; border-radius:7px;
  background:var(--red); border:none;
  color:#fff; font-family:inherit; font-size:14px; font-weight:700;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.nav-pub:active{background:#d63f32;}

/* ── FORM ── */
.form{padding:20px 16px;}

/* SECTION */
.sec{margin-bottom:28px;}
.sec-title{
  font-size:14px; font-weight:700; color:var(--char);
  margin-bottom:14px; padding-bottom:10px;
  border-bottom:1px solid var(--cloud);
}
.sec-badge{
  display:inline-block; padding:2px 7px;
  background:rgba(232,72,58,.08); color:var(--red);
  border-radius:4px; font-size:11px; font-weight:700;
  margin-left:8px;
}

/* FIELD */
.field{margin-bottom:14px;}
label{display:block;font-size:13px;font-weight:600;color:var(--char);margin-bottom:6px;}
.req{color:var(--red);}
input,textarea{
  width:100%; padding:13px 14px;
  border:1.5px solid var(--cloud); border-radius:10px;
  font-family:inherit; font-size:16px; color:var(--ink);
  background:#fff; outline:none;
  -webkit-appearance:none;
  transition:border-color .12s;
}
input:focus,textarea:focus{border-color:var(--ink);}
textarea{resize:none;min-height:88px;line-height:1.6;font-size:15px;}
.counter{font-size:11px;color:var(--stone);text-align:right;margin-top:4px;}
.field-note{font-size:12px;color:var(--stone);margin-top:5px;}

/* UPLOAD */
.upload-preview{
  border:1.5px solid var(--cloud); border-radius:10px;
  overflow:hidden; position:relative;
}
.upload-preview img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
.upload-rm{
  position:absolute; top:10px; right:10px;
  width:30px; height:30px; border-radius:7px;
  background:rgba(28,28,26,.75); color:#fff;
  border:none; cursor:pointer; font-size:13px;
  display:flex; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.upload-rm:active{background:rgba(28,28,26,.9);}

.upload-zone{
  border:1.5px dashed var(--cloud); border-radius:10px;
  background:#fff; padding:32px 20px;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  cursor:pointer; text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.upload-zone:active{background:var(--light);}
.upload-zone svg{color:var(--stone);}
.upload-zone-title{font-size:15px;font-weight:600;color:var(--char);}
.upload-zone-sub{font-size:13px;color:var(--stone);}
.upload-zone-limit{font-size:11px;color:var(--stone);background:var(--light);padding:3px 10px;border-radius:4px;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  padding:8px 14px; border-radius:8px;
  border:1.5px solid var(--cloud); background:#fff;
  font-family:inherit; font-size:14px; font-weight:500; color:var(--char);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .1s, background .1s, color .1s;
}
.chip:active{background:var(--light);}
.chip.on{border-color:var(--ink); background:var(--ink); color:var(--white); font-weight:600;}

/* PROMPT */
.prompt-toggle{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-radius:10px;
  border:1.5px solid var(--cloud); background:#fff;
  cursor:pointer; margin-bottom:12px;
  -webkit-tap-highlight-color:transparent;
}
.prompt-toggle.on{border-color:var(--ink);}
.prompt-toggle:active{background:var(--light);}
.pt-left{display:flex;align-items:center;gap:12px;}
.pt-text{}
.pt-title{font-size:14px;font-weight:700;}
.pt-sub{font-size:12px;color:var(--stone);margin-top:2px;}
.pt-badge{padding:3px 8px;border-radius:4px;background:rgba(232,72,58,.08);color:var(--red);font-size:11px;font-weight:700;}
.toggle{
  width:40px; height:23px; border-radius:100px;
  background:var(--cloud); position:relative;
  transition:background .2s; flex-shrink:0;
}
.toggle.on{background:var(--ink);}
.toggle::after{
  content:''; position:absolute; top:3.5px; left:3.5px;
  width:16px; height:16px; border-radius:50%; background:#fff;
  transition:transform .2s;
}
.toggle.on::after{transform:translateX(17px);}

.prompt-item{
  background:var(--light); border-radius:10px;
  padding:14px; border:1px solid var(--cloud); margin-bottom:10px;
}
.pi-label{font-size:12px;font-weight:700;color:var(--char);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.pi-step{background:var(--cloud);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;color:var(--char);}
.prompt-item textarea{background:#fff;font-size:14px;min-height:80px;border-color:var(--cloud);}

.add-step{
  display:flex; align-items:center; justify-content:center; gap:7px;
  width:100%; padding:12px;
  border:1.5px dashed var(--cloud); border-radius:10px;
  background:none; font-family:inherit; font-size:14px; font-weight:600; color:var(--stone);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.add-step:active{background:var(--light);}

/* ── BOTTOM BAR ── */
.bottom-bar{
  position:fixed; bottom:0; left:0; right:0;
  background:var(--white); border-top:1px solid var(--cloud);
  padding:10px 16px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex; align-items:center; justify-content:space-between;
}
.draft-ok{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--stone);}
.bottom-btns{display:flex;gap:8px;}
.btn-draft{
  padding:11px 16px; border-radius:9px;
  background:var(--light); border:1px solid var(--cloud);
  font-family:inherit; font-size:14px; font-weight:600; color:var(--char);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn-draft:active{background:var(--cloud);}
.btn-publish{
  padding:11px 20px; border-radius:9px;
  background:var(--red); border:none;
  font-family:inherit; font-size:14px; font-weight:700; color:#fff;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.btn-publish:active{background:#d63f32;}

/* ── DESKTOP ── */
@media(min-width:768px){
  body{padding-bottom:0;}
  nav{padding:0 24px;height:56px;}
  .form{max-width:700px;margin:0 auto;padding:28px 24px 90px;}
  .bottom-bar{padding:12px 24px;max-width:100%;}
  .prompt-toggle:hover{border-color:var(--char);}
  .chip:hover{border-color:var(--char);}
}
</style>
</head>
<body>

<nav>
  <div class="nav-back">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    취소
  </div>
  <span class="nav-title">프로젝트 올리기</span>
  <button class="nav-pub">게시하기</button>
</nav>

<div class="form">

  <!-- 썸네일 -->
  <div class="sec">
    <div class="sec-title">썸네일</div>
    <div class="upload-preview">
      <img src="https://picsum.photos/seed/up1/800/450" alt="">
      <button class="upload-rm">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- 기본 정보 -->
  <div class="sec">
    <div class="sec-title">기본 정보</div>
    <div class="field">
      <label>제목 <span class="req">*</span></label>
      <input type="text" value="Claude + Cursor로 만든 실시간 협업 메모 앱">
      <div class="counter">36 / 60</div>
    </div>
    <div class="field">
      <label>소개 <span class="req">*</span></label>
      <textarea>팀원들과 동시에 편집 가능한 메모 앱을 바이브코딩으로 만들었어요. Supabase Realtime 덕분에 지연 없이 동기화됩니다.</textarea>
    </div>
    <div class="field">
      <label>데모 URL <span class="req">*</span></label>
      <input type="url" value="https://memo-collab.vercel.app" inputmode="url">
    </div>
    <div class="field">
      <label>GitHub URL</label>
      <input type="url" placeholder="https://github.com/..." inputmode="url">
      <div class="field-note">선택 · 공개 레포만 가능</div>
    </div>
  </div>

  <!-- AI 툴 -->
  <div class="sec">
    <div class="sec-title">사용한 AI 툴</div>
    <div class="chips">
      <button class="chip on">Cursor</button>
      <button class="chip on">Claude</button>
      <button class="chip">Lovable</button>
      <button class="chip">Bolt</button>
      <button class="chip">v0</button>
      <button class="chip">Replit</button>
      <button class="chip">ChatGPT</button>
      <button class="chip on">Supabase</button>
      <button class="chip">Windsurf</button>
    </div>
  </div>

  <!-- 카테고리 -->
  <div class="sec">
    <div class="sec-title">카테고리</div>
    <div class="chips">
      <button class="chip on">웹 앱</button>
      <button class="chip">모바일 앱</button>
      <button class="chip">랜딩 페이지</button>
      <button class="chip">자동화</button>
      <button class="chip">SaaS</button>
      <button class="chip">크롬 익스텐션</button>
      <button class="chip">챗봇 / AI 에이전트</button>
      <button class="chip">데이터 분석</button>
    </div>
  </div>

  <!-- 프롬프트 -->
  <div class="sec">
    <div class="sec-title">
      프롬프트 공유
      <span class="sec-badge">차별화 기능</span>
    </div>

    <div class="prompt-toggle on">
      <div class="pt-left">
        <div class="pt-text">
          <div class="pt-title">프롬프트 공개하기</div>
          <div class="pt-sub">어떻게 만들었는지 나눠주면 더 많은 반응을 얻어요</div>
        </div>
        <span class="pt-badge">좋아요 +32%</span>
      </div>
      <div class="toggle on"></div>
    </div>

    <div class="prompt-item">
      <div class="pi-label"><span class="pi-step">1단계</span> 기획 · 설계</div>
      <textarea>실시간 협업이 가능한 메모 앱을 만들려고 해. Next.js + Supabase를 쓸 거고, 여러 명이 동시에 같은 문서를 편집할 수 있어야 해. 먼저 전체 아키텍처를 설계해줘.</textarea>
    </div>

    <div class="prompt-item">
      <div class="pi-label"><span class="pi-step">2단계</span> UI 구현</div>
      <textarea>위 아키텍처를 바탕으로 메인 에디터 컴포넌트를 만들어줘. TipTap을 쓸 거고, 현재 편집 중인 유저의 커서 위치를 실시간으로 보여줘야 해.</textarea>
    </div>

    <button class="add-step">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      프롬프트 단계 추가
    </button>
  </div>

</div>

<div class="bottom-bar">
  <div class="draft-ok">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="7" fill="#22c55e"/><path d="M3.5 7l2.5 2.5 4.5-5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    임시저장 완료
  </div>
  <div class="bottom-btns">
    <button class="btn-draft">임시저장</button>
    <button class="btn-publish">게시하기</button>
  </div>
</div>

</body>
</html>
